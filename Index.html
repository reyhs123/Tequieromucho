<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de las Flores Amarillas</title>
    <style>
        /* Reset y fondo de cielo estrellado */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, #1a2a42 0%, #0b1320 100%);
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        /* Estrellas de fondo */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px white; }
        }

        /* Texto brillante superior */
        .title {
            color: #fffb8f;
            text-align: center;
            margin-top: 10vh;
            font-size: 2.5rem;
            line-height: 1.3;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffc107, 0 0 30px #ff9800;
            z-index: 10;
        }

        .sunflower {
            font-size: 2rem;
            margin-top: 10px;
            filter: drop-shadow(0 0 10px #ffc107);
            z-index: 10;
        }

        /* Texto de instrucción inferior */
        .instruction {
            position: absolute;
            bottom: 50px;
            color: white;
            font-size: 1.5rem;
            text-shadow: 0 0 10px white, 0 0 20px #ffeb3b;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.5s ease;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Contenedor del jardín */
        #garden {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            pointer-events: none; /* Deja que el clic pase al body */
        }

        /* Estilos de las flores animadas */
        .flower-wrapper {
            position: absolute;
            bottom: -20px;
            transform-origin: bottom center;
        }

        .stem {
            width: 8px;
            background: linear-gradient(to top, #1b5e20, #4caf50);
            border-radius: 4px;
            transform-origin: bottom center;
            position: relative;
            transition: height 2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 10px #4caf50;
        }

        /* Cabeza de la flor (botón que florece) */
        .head {
            width: 45px;
            height: 55px;
            background: radial-gradient(circle at 50% 100%, #ff9800, #ffeb3b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 25px #ffeb3b, inset 0 -10px 15px #ff9800;
            position: absolute;
            top: -45px;
            left: -18.5px;
            transform-origin: bottom center;
            transform: scale(0);
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Detalles de las hojas verdes */
        .leaf {
            width: 35px;
            height: 60px;
            background: linear-gradient(to top right, #2e7d32, #4caf50);
            border-radius: 0 100% 0 100%;
            position: absolute;
            bottom: 30%;
            transform-origin: bottom left;
            transform: scale(0) rotate(0deg);
            transition: transform 1.5s ease-out;
            box-shadow: 0 0 10px #4caf50;
        }

        .leaf.left {
            left: -30px;
            border-radius: 100% 0 100% 0;
            transform-origin: bottom right;
        }

        .leaf.right {
            right: -30px;
        }

        /* Brillo de polen flotante */
        .pollen {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fffb8f;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffeb3b;
            opacity: 0;
            transition: all 2s ease-out;
        }
    </style>
</head>
<body>

    <!-- Texto Principal -->
    <h1 class="title">Feliz Día de las<br>Flores Amarillas</h1>
    <div class="sunflower">🌻</div>

    <!-- Contenedor donde crecerán las flores -->
    <div id="garden"></div>

    <!-- Botón / Texto de interacción -->
    <p class="instruction" id="instruction">Presiona para ver la magia...</p>

    <script>
        // 1. Crear el cielo estrellado
        function createStars() {
            const numStars = 80;
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                document.body.appendChild(star);
            }
        }
        createStars();

        // 2. Lógica para hacer crecer las flores
        const garden = document.getElementById('garden');
        const instruction = document.getElementById('instruction');
        let isGrown = false;

        function growFlowers() {
            if (isGrown) return; // Evita que se repita si ya crecieron
            isGrown = true;
            instruction.style.opacity = '0'; // Oculta el texto
            
            // Configuración de cada flor: altura final, inclinación, retraso en nacer (para efecto fluido)
            const flowerData = [
                { height: 280, angle: 0, delay: 0 },
                { height: 240, angle: -20, delay: 300 },
                { height: 250, angle: 20, delay: 500 },
                { height: 180, angle: -35, delay: 800 },
                { height: 190, angle: 35, delay: 1000 },
                { height: 330, angle: -10, delay: 1200 },
                { height: 340, angle: 10, delay: 1400 }
            ];

            flowerData.forEach((data, index) => {
                setTimeout(() => {
                    // Contenedor de la flor individual
                    const wrapper = document.createElement('div');
                    wrapper.className = 'flower-wrapper';
                    wrapper.style.transform = `rotate(${data.angle}deg)`;

                    // Tallo
                    const stem = document.createElement('div');
                    stem.className = 'stem';
                    stem.style.height = '0px';

                    // Cabeza de la flor
                    const head = document.createElement('div');
                    head.className = 'head';

                    // Hojas
                    const leaf = document.createElement('div');
                    leaf.className = `leaf ${index % 2 === 0 ? 'left' : 'right'}`;

                    // Ensamblar
                    stem.appendChild(head);
                    stem.appendChild(leaf);
                    wrapper.appendChild(stem);
                    garden.appendChild(wrapper);

                    // Disparar la animación después de que el elemento exista en el DOM
                    setTimeout(() => {
                        stem.style.height = `${data.height}px`; // El tallo sube
                        
                        // La flor se forma y florece mientras el tallo sube
                        setTimeout(() => {
                            head.style.transform = 'scale(1)';
                            leaf.style.transform = index % 2 === 0 ? 'scale(1) rotate(-45deg)' : 'scale(1) rotate(45deg)';
                        }, 500); // Retraso para que florezca a mitad de camino

                        // Generar polen flotante al florecer
                        for(let p = 0; p < 3; p++) {
                            setTimeout(() => {
                                const pollen = document.createElement('div');
                                pollen.className = 'pollen';
                                pollen.style.left = `${Math.random() * 40 - 20}px`;
                                pollen.style.bottom = `${data.height}px`;
                                garden.appendChild(pollen);
                                
                                setTimeout(() => {
                                    pollen.style.opacity = '0.8';
                                    pollen.style.transform = `translateY(-${Math.random() * 50 + 50}px) translateX(${Math.random() * 40 - 20}px)`;
                                }, 50);

                            }, 1500 + (p * 200));
                        }

                    }, 50);

                }, data.delay);
            });
        }

        // Detectar clics o toques en la pantalla
        document.body.addEventListener('mousedown', growFlowers);
        document.body.addEventListener('touchstart', growFlowers);
    </script>
</body>
</html>
