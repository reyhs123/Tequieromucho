<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de las Flores Amarillas</title>
    <style>
        /* Fondo de cielo estrellado profundo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, #12243e 0%, #060a13 100%);
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Estrellas sutiles */
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); }
            100% { opacity: 0.9; transform: scale(1.2); box-shadow: 0 0 8px #fff; }
        }

        /* Títulos Glow */
        .title {
            color: #fffb8f;
            text-align: center;
            margin-top: 10vh;
            font-size: 2.5rem;
            line-height: 1.3;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffc107, 0 0 30px #ff9800;
            z-index: 10;
        }

        .sunflower {
            font-size: 2rem;
            margin-top: 10px;
            filter: drop-shadow(0 0 10px #ffc107);
            z-index: 10;
        }

        .instruction {
            position: absolute;
            bottom: 50px;
            color: white;
            font-size: 1.5rem;
            text-shadow: 0 0 10px white, 0 0 20px #ffeb3b;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.5s ease;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        #garden {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85%; /* Aumentado para dar más espacio vertical */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            pointer-events: none;
        }

        .flower-wrapper {
            position: absolute;
            bottom: -20px;
            transform-origin: bottom center;
        }

        /* Tallo más grueso */
        .stem {
            width: 12px; /* Antes 8px */
            background: linear-gradient(to top, #154c18, #388e3c);
            border-radius: 6px;
            transform-origin: bottom center;
            position: relative;
            transition: height 2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 12px #4caf50;
        }

        /* Contenedor más grande para la flor */
        .flower-head-container {
            width: 60px; /* Antes 40px */
            height: 60px; /* Antes 40px */
            position: absolute;
            top: -60px;
            left: -24px; /* Centrado perfecto sobre el tallo de 12px (30 - 6) */
            transform-origin: bottom center;
            transform: scale(0);
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 2;
        }

        /* Pétalos más largos y anchos */
        .petal {
            position: absolute;
            bottom: 50%; 
            left: 50%;
            width: 24px; /* Antes 16px */
            height: 42px; /* Antes 28px */
            margin-left: -12px; /* Mitad del ancho para centrar */
            background: linear-gradient(to top, #ff9800, #ffeb3b);
            border-radius: 50% 50% 20% 20%; 
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.8);
            transform-origin: center bottom; 
            transform: rotate(0deg); 
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .flower-head-container.florecer .petal-0 { transform: rotate(0deg); }
        .flower-head-container.florecer .petal-1 { transform: rotate(45deg); }
        .flower-head-container.florecer .petal-2 { transform: rotate(90deg); }
        .flower-head-container.florecer .petal-3 { transform: rotate(135deg); }
        .flower-head-container.florecer .petal-4 { transform: rotate(180deg); }
        .flower-head-container.florecer .petal-5 { transform: rotate(225deg); }
        .flower-head-container.florecer .petal-6 { transform: rotate(270deg); }
        .flower-head-container.florecer .petal-7 { transform: rotate(315deg); }

        /* Centro más grande */
        .petal-center {
            position: absolute;
            bottom: 50%; 
            left: 50%;
            width: 30px; /* Antes 20px */
            height: 30px; /* Antes 20px */
            margin-left: -15px;
            margin-bottom: -15px; 
            background: radial-gradient(circle, #ffe082, #ff8f00);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffeb3b, inset 0 0 8px rgba(216, 107, 0, 0.8);
            transform: scale(0);
            transition: transform 1s ease 0.6s;
            z-index: 5;
        }

        .flower-head-container.florecer .petal-center { transform: scale(1); }

        /* Hojas más grandes */
        .leaf {
            width: 50px; /* Antes 35px */
            height: 85px; /* Antes 60px */
            background: linear-gradient(to top right, #2e7d32, #4caf50);
            border-radius: 0 100% 0 100%;
            position: absolute;
            bottom: 30%;
            transform-origin: bottom left;
            transform: scale(0) rotate(0deg);
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 15px #4caf50;
        }

        .leaf.left { left: -45px; border-radius: 100% 0 100% 0; transform-origin: bottom right; }
        .leaf.right { right: -45px; }

        /* Polen un poco más grande */
        .pollen {
            position: absolute;
            width: 7px;
            height: 7px;
            background: #fffb8f;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffeb3b, 0 0 25px #fff;
            opacity: 0;
            transition: all 2.5s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1 class="title">Feliz Día de las<br>Flores Amarillas</h1>
    <div class="sunflower">🌻</div>

    <div id="garden"></div>

    <p class="instruction" id="instruction">Presiona para ver la magia...</p>

    <script>
        function createStars() {
            const numStars = 80;
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = `${Math.random() * 3 + 1}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.animationDuration = `${Math.random() * 4 + 2}s`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                document.body.appendChild(star);
            }
        }
        createStars();

        const garden = document.getElementById('garden');
        const instruction = document.getElementById('instruction');
        let isGrown = false;

        function growFlowers() {
            if (isGrown) return; 
            isGrown = true;
            instruction.style.opacity = '0'; 
            
            // Alturas incrementadas para hacer las flores notablemente más grandes
            const flowerData = [
                { height: 420, angle: 0, delay: 0 },
                { height: 350, angle: -20, delay: 300 },
                { height: 370, angle: 20, delay: 500 },
                { height: 260, angle: -35, delay: 800 },
                { height: 280, angle: 35, delay: 1000 },
                { height: 480, angle: -10, delay: 1200 },
                { height: 500, angle: 10, delay: 1400 }
            ];

            flowerData.forEach((data, index) => {
                setTimeout(() => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'flower-wrapper';
                    wrapper.style.transform = `rotate(${data.angle}deg)`;

                    const stem = document.createElement('div');
                    stem.className = 'stem';
                    stem.style.height = '0px';

                    const headContainer = document.createElement('div');
                    headContainer.className = 'flower-head-container';
                    
                    for(let i = 0; i < 8; i++) {
                        const petal = document.createElement('div');
                        petal.className = `petal petal-${i}`;
                        headContainer.appendChild(petal);
                    }
                    const center = document.createElement('div');
                    center.className = 'petal-center';
                    headContainer.appendChild(center);

                    const leaf = document.createElement('div');
                    leaf.className = `leaf ${index % 2 === 0 ? 'left' : 'right'}`;

                    stem.appendChild(headContainer);
                    stem.appendChild(leaf);
                    wrapper.appendChild(stem);
                    garden.appendChild(wrapper);

                    setTimeout(() => {
                        stem.style.height = `${data.height}px`;
                        leaf.style.transform = index % 2 === 0 ? 'scale(1) rotate(-45deg)' : 'scale(1) rotate(45deg)';

                        setTimeout(() => {
                            headContainer.style.transform = 'scale(1)';
                        }, 400); 

                        setTimeout(() => {
                            headContainer.classList.add('florecer');
                        }, 1600); 

                        for(let p = 0; p < 6; p++) {
                            setTimeout(() => {
                                const pollen = document.createElement('div');
                                pollen.className = 'pollen';
                                pollen.style.left = `${Math.random() * 60 - 30}px`;
                                pollen.style.bottom = `${data.height + 30}px`;
                                garden.appendChild(pollen);
                                
                                setTimeout(() => {
                                    pollen.style.opacity = '0.9';
                                    pollen.style.transform = `translateY(-${Math.random() * 100 + 80}px) translateX(${Math.random() * 80 - 40}px) scale(1.5)`;
                                }, 50);

                            }, 2200 + (p * 150));
                        }

                    }, 50);

                }, data.delay);
            });
        }

        document.body.addEventListener('mousedown', growFlowers);
        document.body.addEventListener('touchstart', growFlowers);
    </script>
</body>
</html>
