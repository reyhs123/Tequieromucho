<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de las Flores Amarillas</title>
    <style>
        /* --- ESTILOS BASE Y FONDO --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            /* Cielo nocturno idéntico a tu referencia */
            background: radial-gradient(circle at bottom, #11233b 0%, #060b14 100%);
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- CIELO ESTRELLADO --- */
        #stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 0.9; transform: scale(1.2); box-shadow: 0 0 5px white; }
        }

        /* --- TEXTOS SUPERIORES --- */
        .header {
            margin-top: 12vh;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            color: #fffb8f;
            font-size: 2.2rem;
            line-height: 1.4;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffc107, 0 0 30px #ff9800;
        }

        .emoji {
            font-size: 2.5rem;
            margin-top: 15px;
            filter: drop-shadow(0 0 10px #ffc107);
        }

        /* --- TEXTO DE INSTRUCCIÓN --- */
        .instruction {
            position: absolute;
            bottom: 60px;
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 0 10px white, 0 0 20px #ffeb3b;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.5s ease;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* --- CONTENEDOR DEL JARDÍN --- */
        #garden {
            position: absolute;
            bottom: -20px;
            width: 100%;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            pointer-events: none;
        }

        /* --- DISEÑO DE LA PLANTA Y FLOR --- */
        .plant-wrapper {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
        }

        /* Tallo */
        .stem {
            width: 8px;
            background: linear-gradient(to top, #1e5e22, #4caf50);
            border-radius: 4px;
            transform-origin: bottom center;
            position: relative;
            height: 0px; /* Crece dinámicamente */
            transition: height 1.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
        }

        /* Hojas verdes del tallo */
        .leaf {
            position: absolute;
            width: 25px;
            height: 45px;
            background: linear-gradient(to top right, #1b5e20, #4caf50);
            border-radius: 0 100% 0 100%;
            bottom: 30%;
            transform-origin: bottom left;
            transform: scale(0) rotate(0deg);
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }

        .leaf.left { left: -20px; border-radius: 100% 0 100% 0; transform-origin: bottom right; }
        .leaf.right { right: -20px; }

        /* Contenedor de la cabeza de la flor (se ancla arriba del tallo) */
        .flower-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0;
            z-index: 10;
        }

        /* Centro de la flor (Círculo naranja/marrón como en tu foto) */
        .flower-center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ffb300, #e65100);
            border-radius: 50%;
            top: -10px;
            left: -10px;
            box-shadow: 0 0 10px #ff9800, inset 0 0 5px rgba(0,0,0,0.3);
            transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2; /* Por encima de los pétalos */
        }

        /* Pétalos (Amarillos, ovalados y reales) */
        .petal {
            position: absolute;
            width: 14px;
            height: 38px;
            background: linear-gradient(to top, #ff9800, #ffeb3b);
            border-radius: 50px; /* Da la forma de pétalo redondeado */
            box-shadow: 0 0 12px rgba(255, 235, 59, 0.7);
            top: -38px; /* Ancla la base del pétalo al centro exacto */
            left: -7px;
            transform-origin: bottom center;
            opacity: 0;
            transform: scale(0) rotate(0deg);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1; /* Por debajo del centro */
        }

        /* Partículas mágicas que salen de la flor */
        .sparkle {
            position: absolute;
            width: 5px; height: 5px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="header">
        <h1 class="title">Feliz Día de las<br>Flores Amarillas</h1>
        <div class="emoji">🌻</div>
    </div>

    <div id="garden"></div>

    <div class="instruction" id="instruction">Presiona para ver la magia...</div>

    <script>
        // 1. GENERAR CIELO ESTRELLADO
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = `${Math.random() * 3 + 1}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starsContainer.appendChild(star);
        }

        // 2. LÓGICA DE ANIMACIÓN DE LAS FLORES (Basado en la foto 1000093985)
        const garden = document.getElementById('garden');
        let animated = false;

        // Estructura del ramo: Altura, Ángulo de inclinación y Retraso en milisegundos
        const bouquet = [
            { height: 350, angle: 0, delay: 0 },       // Centro Alta
            { height: 280, angle: -20, delay: 200 },   // Izquierda Alta
            { height: 290, angle: 20, delay: 400 },    // Derecha Alta
            { height: 200, angle: -35, delay: 600 },   // Izquierda Media
            { height: 210, angle: 35, delay: 800 },    // Derecha Media
            { height: 140, angle: -50, delay: 1000 },  // Izquierda Baja
            { height: 150, angle: 50, delay: 1200 },   // Derecha Baja
            { height: 120, angle: 0, delay: 1400 }     // Centro Baja
        ];

        function startMagic() {
            if (animated) return;
            animated = true;
            document.getElementById('instruction').style.opacity = '0';

            bouquet.forEach((flower) => {
                setTimeout(() => {
                    // Contenedor principal de esta planta
                    const plant = document.createElement('div');
                    plant.className = 'plant-wrapper';
                    plant.style.transform = `rotate(${flower.angle}deg)`;

                    // Tallo
                    const stem = document.createElement('div');
                    stem.className = 'stem';

                    // Hojas
                    const leafLeft = document.createElement('div');
                    leafLeft.className = 'leaf left';
                    const leafRight = document.createElement('div');
                    leafRight.className = 'leaf right';

                    // Cabeza de la flor
                    const flowerHead = document.createElement('div');
                    flowerHead.className = 'flower-head';

                    // Centro de la flor (El círculo naranja)
                    const center = document.createElement('div');
                    center.className = 'flower-center';
                    flowerHead.appendChild(center);

                    // Pétalos (Creamos 10 pétalos por flor)
                    const numPetals = 10;
                    const petalsArray = [];
                    for (let i = 0; i < numPetals; i++) {
                        const petal = document.createElement('div');
                        petal.className = 'petal';
                        flowerHead.appendChild(petal);
                        petalsArray.push(petal);
                    }

                    // Ensamblar todo
                    stem.appendChild(leafLeft);
                    stem.appendChild(leafRight);
                    stem.appendChild(flowerHead);
                    plant.appendChild(stem);
                    garden.appendChild(plant);

                    // --- SECUENCIA DE ANIMACIÓN ---
                    
                    // 1. Crece el tallo
                    setTimeout(() => {
                        stem.style.height = `${flower.height}px`;
                        
                        // 2. Salen las hojas a mitad de camino
                        setTimeout(() => {
                            leafLeft.style.transform = 'scale(1) rotate(-45deg)';
                            leafRight.style.transform = 'scale(1) rotate(45deg)';
                        }, 600);

                        // 3. Cuando el tallo termina de crecer, aparece el centro y florecen los pétalos
                        setTimeout(() => {
                            // Aparece el centro naranja
                            center.style.transform = 'scale(1)';

                            // Se abren los pétalos en círculo perfecto
                            petalsArray.forEach((petal, i) => {
                                const angle = (i * 360) / numPetals;
                                // rotate(ángulo) los gira en círculo. translateY(-8px) los empuja un poco hacia afuera del centro
                                petal.style.transform = `rotate(${angle}deg) translateY(-8px) scale(1)`;
                                petal.style.opacity = '1';
                            });

                            // 4. Magia de brillos saliendo de la flor
                            for(let s = 0; s < 4; s++) {
                                setTimeout(() => {
                                    const sparkle = document.createElement('div');
                                    sparkle.className = 'sparkle';
                                    flowerHead.appendChild(sparkle);
                                    
                                    setTimeout(() => {
                                        sparkle.style.opacity = '1';
                                        sparkle.style.transform = `translate(${Math.random() * 60 - 30}px, ${Math.random() * -80 - 20}px) scale(1.5)`;
                                        sparkle.style.transition = 'all 2s ease-out';
                                    }, 50);
                                }, 800 + (s * 200));
                            }

                        }, 1300); // Se ejecuta cuando el tallo casi llega arriba

                    }, 50);

                }, flower.delay);
            });
        }

        // Iniciar al hacer clic en cualquier parte
        document.body.addEventListener('click', startMagic);
        document.body.addEventListener('touchstart', startMagic);
    </script>
</body>
</html>
