<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de las Flores Amarillas</title>
    <style>
        /* Reset y fondo de cielo estrellado con degradado suave */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, #1e3a5f 0%, #0b1320 100%);
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Evita el destello de toque en móviles */
        }

        /* Estrellas de fondo parpadeantes */
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); }
            100% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 8px #fff; }
        }

        /* Texto brillante superior */
        .title {
            color: #fffb8f;
            text-align: center;
            margin-top: 10vh;
            font-size: 2.5rem;
            line-height: 1.3;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffc107, 0 0 30px #ff9800;
            z-index: 10;
        }

        .sunflower {
            font-size: 2rem;
            margin-top: 10px;
            filter: drop-shadow(0 0 10px #ffc107);
            z-index: 10;
        }

        /* Texto de instrucción inferior animado */
        .instruction {
            position: absolute;
            bottom: 50px;
            color: white;
            font-size: 1.5rem;
            text-shadow: 0 0 10px white, 0 0 20px #ffeb3b;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.5s ease;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Contenedor del jardín, sin eventos de puntero */
        #garden {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            pointer-events: none;
        }

        /* Contenedor individual de cada flor */
        .flower-wrapper {
            position: absolute;
            bottom: -20px;
            transform-origin: bottom center;
        }

        /* Estilo del tallo de la flor */
        .stem {
            width: 8px;
            background: linear-gradient(to top, #1b5e20, #4caf50);
            border-radius: 4px;
            transform-origin: bottom center;
            position: relative;
            transition: height 2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 10px #4caf50;
        }

        /* Contenedor de la cabeza de la flor (bulbo que florece) */
        .flower-head-container {
            width: 40px;
            height: 40px;
            position: absolute;
            top: -40px;
            left: -16px;
            transform-origin: bottom center;
            transform: scale(0);
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Estilo base de los pétalos de la flor */
        .petal {
            position: absolute;
            top: 0;
            left: 50%;
            width: 15px;
            height: 25px;
            margin-left: -7.5px;
            background: radial-gradient(circle at 50% 100%, #ff9800, #ffeb3b);
            border-radius: 0 100% 0 100%;
            box-shadow: 0 0 15px #ffeb3b, inset 0 -5px 10px #ff9800;
            transform-origin: bottom center;
            transform: rotate(0deg) scale(0);
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Lógica para posicionar los pétalos radialmente cuando florece */
        /* Pétalo central */
        .flower-head-container.florecer .petal-0 { transform: rotate(0deg) scale(1.1) translateY(-2px); }

        /* Pétalos exteriores */
        .flower-head-container.florecer .petal-1 { transform: rotate(45deg) scale(1.1) translateX(15px) translateY(-5px); }
        .flower-head-container.florecer .petal-2 { transform: rotate(90deg) scale(1.1) translateX(18px) translateY(-10px); }
        .flower-head-container.florecer .petal-3 { transform: rotate(135deg) scale(1.1) translateX(15px) translateY(-15px); }
        .flower-head-container.florecer .petal-4 { transform: rotate(225deg) scale(1.1) translateX(-15px) translateY(-15px); }
        .flower-head-container.florecer .petal-5 { transform: rotate(270deg) scale(1.1) translateX(-18px) translateY(-10px); }
        .flower-head-container.florecer .petal-6 { transform: rotate(315deg) scale(1.1) translateX(-15px) translateY(-5px); }

        /* Centro de la flor */
        .petal-center {
            position: absolute;
            top: 15px;
            left: 50%;
            width: 10px;
            height: 10px;
            margin-left: -5px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff98f, inset 0 0 5px #8c6e00;
            transform: scale(0);
            transition: transform 1.5s ease 0.8s;
        }

        .flower-head-container.florecer .petal-center { transform: scale(1); }

        /* Detalles de las hojas verdes del tallo */
        .leaf {
            width: 35px;
            height: 60px;
            background: linear-gradient(to top right, #2e7d32, #4caf50);
            border-radius: 0 100% 0 100%;
            position: absolute;
            bottom: 30%;
            transform-origin: bottom left;
            transform: scale(0) rotate(0deg);
            transition: transform 1.5s ease-out;
            box-shadow: 0 0 10px #4caf50;
        }

        .leaf.left {
            left: -30px;
            border-radius: 100% 0 100% 0;
            transform-origin: bottom right;
        }

        .leaf.right {
            right: -30px;
        }

        /* Brillo de polen flotante */
        .pollen {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fffb8f;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffeb3b;
            opacity: 0;
            transition: all 2.5s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body>

    
<h1 class="title">Feliz Día de las<br>Flores Amarillas</h1>
    <div class="sunflower">🌻</div>

    
<div id="garden"></div>

    
<p class="instruction" id="instruction">Presiona para ver la magia...</p>

    <script>
        // 1. Crear el cielo estrellado
        function createStars() {
            const numStars = 80;
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = `${Math.random() * 3 + 1}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.animationDuration = `${Math.random() * 4 + 2}s`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                document.body.appendChild(star);
            }
        }
        createStars();

        // 2. Lógica para hacer crecer y abrir las flores
        const garden = document.getElementById('garden');
        const instruction = document.getElementById('instruction');
        let isGrown = false;

        function growFlowers() {
            if (isGrown) return; 
            isGrown = true;
            instruction.style.opacity = '0'; 
            
            // Configuración de cada flor: altura final, inclinación, retraso en nacer
            const flowerData = [
                { height: 280, angle: 0, delay: 0 },
                { height: 240, angle: -20, delay: 300 },
                { height: 250, angle: 20, delay: 500 },
                { height: 180, angle: -35, delay: 800 },
                { height: 190, angle: 35, delay: 1000 },
                { height: 330, angle: -10, delay: 1200 },
                { height: 340, angle: 10, delay: 1400 }
            ];

            flowerData.forEach((data, index) => {
                setTimeout(() => {
                    // Contenedor de la flor individual
                    const wrapper = document.createElement('div');
                    wrapper.className = 'flower-wrapper';
                    wrapper.style.transform = `rotate(${data.angle}deg)`;

                    // Tallo
                    const stem = document.createElement('div');
                    stem.className = 'stem';
                    stem.style.height = '0px';

                    // Contenedor de la cabeza de la flor
                    const headContainer = document.createElement('div');
                    headContainer.className = 'flower-head-container';
                    
                    // Crear 7 pétalos radiales y un centro
                    for(let i = 0; i < 7; i++) {
                        const petal = document.createElement('div');
                        petal.className = `petal petal-${i}`;
                        headContainer.appendChild(petal);
                    }
                    const center = document.createElement('div');
                    center.className = 'petal-center';
                    headContainer.appendChild(center);

                    // Hojas
                    const leaf = document.createElement('div');
                    leaf.className = `leaf ${index % 2 === 0 ? 'left' : 'right'}`;

                    // Ensamblar la flor
                    stem.appendChild(headContainer);
                    stem.appendChild(leaf);
                    wrapper.appendChild(stem);
                    garden.appendChild(wrapper);

                    // Disparar la animación después de que el elemento exista en el DOM
                    setTimeout(() => {
                        stem.style.height = `${data.height}px`; // El tallo sube
                        leaf.style.transform = index % 2 === 0 ? 'scale(1) rotate(-45deg)' : 'scale(1) rotate(45deg)';

                        // 1er paso: Aparece el bulbo cerrado a escala 1
                        setTimeout(() => {
                            headContainer.style.transform = 'scale(1)';
                        }, 500); 

                        // 2do paso: ¡Las flores se abren radialmente!
                        setTimeout(() => {
                            headContainer.classList.add('florecer');
                        }, 1600); 

                        // 3er paso: Generar polen flotante al florecer
                        for(let p = 0; p < 4; p++) {
                            setTimeout(() => {
                                const pollen = document.createElement('div');
                                pollen.className = 'pollen';
                                pollen.style.left = `${Math.random() * 40 - 20}px`;
                                pollen.style.bottom = `${data.height + 20}px`; // Salir de la flor
                                garden.appendChild(pollen);
                                
                                setTimeout(() => {
                                    pollen.style.opacity = '0.8';
                                    pollen.style.transform = `translateY(-${Math.random() * 60 + 40}px) translateX(${Math.random() * 40 - 20}px)`;
                                }, 50);

                            }, 2400 + (p * 200));
                        }

                    }, 50);

                }, data.delay);
            });
        }

        // Detectar clics o toques en la pantalla
        document.body.addEventListener('mousedown', growFlowers);
        document.body.addEventListener('touchstart', growFlowers);
    </script>
</body>
</html>
